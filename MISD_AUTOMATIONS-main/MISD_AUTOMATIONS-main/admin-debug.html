<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Admin Debug</title>
</head>
<body>
    <pre id="output">Running...</pre>
    <iframe id="app-frame" src="product-x1.html" style="width: 1400px; height: 1200px; border: 1px solid #ccc;"></iframe>
    <script>
        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        const output = document.getElementById('output');

        const run = async () => {
            const frame = document.getElementById('app-frame');
            await new Promise((resolve) => frame.addEventListener('load', resolve, { once: true }));
            await sleep(1500);

            const doc = frame.contentWindow.document;
            const win = frame.contentWindow;
            const results = [];

            const trigger = doc.querySelector('[data-admin-logo-trigger]');
            results.push(`trigger-found:${Boolean(trigger)}`);

            for (let i = 0; i < 7; i += 1) {
                trigger.click();
                await sleep(30);
            }

            await sleep(400);

            const overlay = doc.getElementById('misd-admin-overlay');
            results.push(`overlay-exists:${Boolean(overlay)}`);
            results.push(`overlay-hidden:${overlay ? overlay.classList.contains('hidden') : 'n/a'}`);

            const firstItemButton = doc.querySelector('#misd-admin-item-list [data-item-id]');
            results.push(`first-item-found:${Boolean(firstItemButton)}`);
            results.push(`first-item-id:${firstItemButton ? firstItemButton.getAttribute('data-item-id') : 'n/a'}`);

            if (firstItemButton) {
                firstItemButton.click();
                await sleep(100);
            }

            const itemId = doc.getElementById('misd-admin-item-id')?.value || '';
            const nameInput = doc.getElementById('misd-admin-name');
            const originalName = nameInput ? nameInput.value : '';
            results.push(`selected-id:${itemId}`);
            results.push(`original-name:${originalName}`);

            if (nameInput) {
                nameInput.value = `${originalName} TEST EDIT`;
                nameInput.dispatchEvent(new Event('input', { bubbles: true }));
            }

            const form = doc.getElementById('misd-admin-form');
            if (form) {
                form.dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
            }
            await sleep(150);

            const state = win.MISDCatalogAdmin.getCatalogState();
            const edited = state.productsPage.find((item) => item.id === itemId);
            results.push(`saved-name:${edited ? edited.name : 'missing'}`);

            const gridFirstCard = doc.querySelector('#products-page-grid h3');
            results.push(`grid-first-title:${gridFirstCard ? gridFirstCard.textContent.trim() : 'missing'}`);

            output.textContent = results.join('\n');
        };

        run().catch((error) => {
            output.textContent = `ERROR\n${error && error.stack ? error.stack : error}`;
        });
    </script>
</body>
</html>
